name: "Baidu Cookie Injector"
description: "在请求百度域名时注入自定义 Cookie"
author: "Violte"

env_schema:
  COOKIE_NAME:
    name: "Cookie 名称"
  COOKIE_VALUE:
    name: "Cookie 值"

mitm:
  hostnames:
    - "*.baidu.com"

scriptings:
  - http_request:
      name: "注入 Cookie"
      match: "^https?://([a-zA-Z0-9-]+\\.)?baidu\\.com"
      script_url: "https://raw.githubusercontent.com/jae-jae/egern-baidu-cookie-injector/main/inject-cookie.js"
